    // Deterministic per-node pseudo-RNG so sparklines are stable across renders.
    function seed(str) {
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = (h * 0x01000193) >>> 0;
      }
      return () => { h = (h * 16807 + 17) >>> 0; return (h % 10000) / 10000; };
    }

    // Generate a believable time-series for a node (deterministic per id).
    function timeSeries(node, days) {
      const rng = seed(node.id + ":" + days);
      if (node.type === "account") {
        return Array.from({ length: days }, () => {
          const base = Math.floor(rng() * 7);
          const spike = rng() > 0.85 ? Math.floor(rng() * 8) : 0;
          return base + spike;
        });
      }
      if (node.type === "narrative") {
        const peakIdx = Math.floor(days * 0.6);
        const decay = node.status === "decaying" ? 0.32 : 0.92;
        return Array.from({ length: days }, (_, i) => {
          if (i <= peakIdx) {
            const t = i / peakIdx;
            return Math.round(node.reach * (0.25 + 0.75 * t) * (0.85 + rng() * 0.3));
          }
          const t = (i - peakIdx) / Math.max(1, days - peakIdx);
          return Math.round(node.reach * (1 - t * (1 - decay)) * (0.85 + rng() * 0.3));
        });
      }
      if (node.type === "hashtag") {
        const vScale = { peak: 1.25, high: 1.0, medium: 0.7, low: 0.5 }[node.velocity] ?? 1;
        return Array.from({ length: days }, (_, i) =>
          Math.round(node.volume * vScale * (0.55 + rng() * 0.6) * (1 + Math.sin(i / 2.5) * 0.18))
        );
      }
      return [];
    }

    // Line/area sparkline.
    function Sparkline({ data, color = "#3B82F6", height = 28, lineWidth = 1.3, area = true }) {
      if (!data || data.length < 2) return null;
      const w = 100;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = (max - min) || 1;
      const stepX = w / (data.length - 1);
      const pts = data.map((v, i) => `${(i * stepX).toFixed(2)},${(height - ((v - min) / range) * height).toFixed(2)}`);
      const linePath = "M" + pts.join(" L");
      const areaPath = linePath + ` L${w},${height} L0,${height} Z`;
      return (
        <svg viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none"
          style={{ width:"100%", height: height + "px", display:"block" }}>
          {area && <path d={areaPath} fill={color} fillOpacity="0.14" />}
          <path d={linePath} fill="none" stroke={color} strokeWidth={lineWidth}
            strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    }

      if (!data || data.length === 0) return null;
      const w = 100;
      const max = Math.max(...data, 1);
      const barW = w / data.length;
      return (
        <svg viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none"
          style={{ width:"100%", height: height + "px", display:"block" }}>
          {data.map((v, i) => {

            return (

                fill={color} opacity={0.55 + (v / max) * 0.4} />
            );
          })}
        </svg>

      const [dims,    setDims]    = useState({ w:800, h:600 });

      useEffect(() => {
        if (!containerRef.current) return;
        const ro = new ResizeObserver(([entry]) =>
          setDims({ w: entry.contentRect.width, h: entry.contentRect.height })
        );
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, []);

      const searchLower = search.trim().toLowerCase();
      const matchesSearch = (n) => {
        if (!searchLower) return true;
        const hay = ((n.handle || "") + " " + (n.label || "") + " " + (n.tags||[]).join(" ")).toLowerCase();
        return hay.includes(searchLower);
      };

        if (!svgRef.current || dims.w < 10) return;
        const { w, h } = dims;
        const svg = d3.select(svgRef.current);
        svg.selectAll("*").remove();

        const visNodes = NODES.filter(n => filters[n.type] && matchesSearch(n));
        const visIds   = new Set(visNodes.map(n => n.id));
        const visEdges = EDGES.filter(e => visIds.has(e.source) && visIds.has(e.target));

        const nodes = visNodes.map(n => ({ ...n }));
        const edges = visEdges.map(e => ({ ...e }));

        const defs = svg.append("defs");
        [["amber","#F59E0B"],["red","#EF4444"],["blue","#3B82F6"],["purple","#8B5CF6"]].forEach(([name, col]) => {
          const f = defs.append("filter").attr("id", `glow-${name}`).attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
          f.append("feGaussianBlur").attr("in","SourceGraphic").attr("stdDeviation","4").attr("result","blur");
          const merge = f.append("feMerge");
          merge.append("feMergeNode").attr("in","blur");
          merge.append("feMergeNode").attr("in","SourceGraphic");
        });
        [["SEEDS","#F59E0B"],["AMPLIFIES","#3B82F6"],["SPREADS_VIA","#EF4444"]].forEach(([type, col]) => {
          defs.append("marker")
            .attr("id",`arrow-${type}`).attr("viewBox","0 -5 10 10").attr("refX",22).attr("refY",0)
            .attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
            .append("path").attr("d","M0,-5L10,0L0,5").attr("fill", col).attr("opacity",0.6);
        });

        const root = svg.append("g");
        svg.call(d3.zoom().scaleExtent([0.25,4]).on("zoom", ev => root.attr("transform", ev.transform)));

        const sim = d3.forceSimulation(nodes)
          .force("link", d3.forceLink(edges).id(d => d.id).distance(d => {
            if (d.type === "PART_OF_NETWORK") return 55;
            if (d.type === "SEEDS")           return 110;
            return 85;
          }).strength(0.25))
          .force("charge", d3.forceManyBody().strength(d => {
            if (d.type === "narrative") return -500;
            if (d.tier === "macro")     return -350;
            if (d.tier === "mid")       return -200;
            return -120;
          }))
          .force("center",  d3.forceCenter(w / 2, h / 2))
          .force("collide", d3.forceCollide(d => nodeRadius(d) + 14));

        const link = root.append("g").selectAll("line").data(edges).join("line")
          .attr("stroke", d => edgeColor(d))
          .attr("stroke-width", d => d.type === "SEEDS" ? 1.8 : d.type === "PART_OF_NETWORK" ? 1.5 : 1)
          .attr("stroke-opacity", d => d.type === "TAGGED_WITH" ? 0.15 : 0.45)
          .attr("stroke-dasharray", d => d.type === "PART_OF_NETWORK" ? "5,4" : null)
          .attr("marker-end", d => ["SEEDS","AMPLIFIES","SPREADS_VIA"].includes(d.type) ? `url(#arrow-${d.type})` : null);

        const nodeG = root.append("g").selectAll("g").data(nodes).join("g").attr("cursor","pointer")
          .call(d3.drag()
            .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
            .on("end",   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
          .on("click", (ev, d) => { ev.stopPropagation(); setSelected(d); })
          .on("mouseenter", (ev, d) => {
            setHovered(d);
            const col = d.type === "hashtag" ? "amber" : d.type === "narrative" ? "red" : "blue";
            d3.select(ev.currentTarget).selectAll("circle,rect,path")
              .style("filter", `url(#glow-${col})`).attr("opacity",1);
          })
          .on("mouseleave", (ev, d) => {
            setHovered(null);
            d3.select(ev.currentTarget).selectAll("circle,rect,path")
              .style("filter", null).attr("opacity", 0.82);
          });

        nodeG.each(function(d) {
          const el  = d3.select(this);
          const r   = nodeRadius(d);
          const col = nodeColor(d);
          if (d.type === "narrative") {
            const s = r * 1.5;
            if (d.status === "active") {
              el.append("rect").attr("width", s*2+12).attr("height", s*2+12).attr("x", -s-6).attr("y", -s-6).attr("rx", 4)
                .attr("transform","rotate(45)").attr("fill","none").attr("stroke", col).attr("stroke-width", 0.5).attr("opacity", 0.25);
            }
            el.append("rect").attr("width", s*2).attr("height", s*2).attr("x",-s).attr("y",-s).attr("rx",3)
              .attr("transform","rotate(45)").attr("fill", col).attr("fill-opacity", 0.12)
              .attr("stroke", col).attr("stroke-width", 1.5).attr("opacity", 0.82);
          } else if (d.type === "hashtag") {
            el.append("path").attr("d", d3.symbol().type(d3.symbolTriangle).size(r*r*3.5)())
              .attr("fill", col).attr("fill-opacity", 0.2).attr("stroke", col).attr("stroke-width", 1).attr("opacity", 0.82);
          } else {
            el.append("circle").attr("r", r+6).attr("fill","none").attr("stroke","#1F2937").attr("stroke-width",1);
            if (d.confidence > 0) {
              const circ = 2 * Math.PI * (r+6);
              el.append("circle").attr("r", r+6).attr("fill","none").attr("stroke", col).attr("stroke-width", 1.2)
                .attr("stroke-dasharray", `${circ * d.confidence} ${circ * (1-d.confidence)}`)
                .attr("stroke-dashoffset", circ * 0.25).attr("opacity", 0.4);
            }
            el.append("circle").attr("r", r).attr("fill", col).attr("fill-opacity", 0.1)
              .attr("stroke", col).attr("stroke-width", d.tier === "macro" ? 2 : 1.5).attr("opacity", 0.82);
            if (d.tier === "macro") el.append("circle").attr("r", 4).attr("fill", col).attr("opacity", 0.6);
          }
          el.append("text")
            .text(() => {
              if (d.type === "account")   return d.handle;
              if (d.type === "narrative") return d.label.length > 20 ? d.label.slice(0,18)+"…" : d.label;
              return d.label;
            })
            .attr("dy", r + 14).attr("text-anchor","middle")
            .attr("font-size", d.tier === "macro" ? "10px" : "8.5px")
            .attr("font-family","'Courier New',monospace")
            .attr("fill", d.type === "narrative" && d.status === "active" ? "#FCA5A5" : d.tier === "macro" ? "#CBD5E1" : "#475569")
            .attr("pointer-events","none");
        });

        sim.on("tick", () => {
          link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
              .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
          nodeG.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        svg.on("click", () => setSelected(null));
        return () => sim.stop();
      }, [dims, filters, search]);

      const toggleFilter = type => setFilters(p => ({ ...p, [type]: !p[type] }));

      return (
        <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
          {/* Filter rail */}
          <div style={{ width:175, background:"#0D1117", borderRight:"1px solid #1F2937",
            padding:"16px 12px", flexShrink:0, display:"flex", flexDirection:"column", gap:22, overflowY:"auto" }}>
            <div>
              <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px", marginBottom:10 }}>NODE FILTERS</div>
              {[{type:"account",color:"#3B82F6",label:"ACCOUNTS"},{type:"narrative",color:"#EF4444",label:"NARRATIVES"},{type:"hashtag",color:"#F59E0B",label:"HASHTAGS"}].map(f => (
                <div key={f.type} onClick={() => toggleFilter(f.type)} style={{
                  display:"flex", alignItems:"center", gap:8, padding:"6px 8px", marginBottom:4, cursor:"pointer",
                  border:`1px solid ${filters[f.type] ? f.color+"50" : "#1F2937"}`,
                  background: filters[f.type] ? f.color+"12" : "transparent",
                  opacity: filters[f.type] ? 1 : 0.35, transition:"all 0.15s" }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:f.color }} />
                  <span style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#94A3B8" }}>{f.label}</span>
                </div>
              ))}
            </div>
            <div>
              <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px", marginBottom:10 }}>EDGE TYPES</div>
              {[{t:"SEEDS",c:"#F59E0B"},{t:"AMPLIFIES",c:"#3B82F6"},{t:"SPREADS VIA",c:"#EF4444"},
                {t:"TAGGED WITH",c:"#2D3748"},{t:"COORDINATION",c:"#8B5CF6",dash:true}].map(e => (
                <div key={e.t} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", marginBottom:2 }}>
                  <div style={{ width:16, height:2,
                    borderTop: e.dash ? `1.5px dashed ${e.c}` : "none",
                    background: e.dash ? "transparent" : e.c }} />
                  <span style={{ fontSize:"8px", letterSpacing:"1px", color:"#374151" }}>{e.t}</span>
                </div>
              ))}
            </div>
            <div>
              <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px", marginBottom:10 }}>THREAT DIST.</div>
              {[{l:"HIGH",c:"#EF4444",n:2},{l:"MEDIUM",c:"#F59E0B",n:5},{l:"LOW",c:"#3B82F6",n:5}].map(t => (
                <div key={t.l} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 6px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ width:6, height:6, background:t.c }} />
                    <span style={{ fontSize:"9px", color:"#4B5563" }}>{t.l}</span>
                  </div>
                  <span style={{ fontSize:"11px", color:t.c, fontWeight:"bold" }}>{t.n}</span>
                </div>
              ))}
            </div>
            <div>
              <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px", marginBottom:10 }}>PLATFORMS</div>
              {[{l:"X / TWITTER",c:"#94A3B8",active:true},{l:"TELEGRAM",c:"#4B5563",active:false},{l:"FACEBOOK",c:"#4B5563",active:false}].map(p => (
                <div key={p.l} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", opacity:p.active?1:0.3 }}>
                  <div style={{ width:6, height:6, borderRadius:"50%", background:p.active?"#10B981":"#374151" }} />
                  <span style={{ fontSize:"8px", color:p.active?"#64748B":"#374151", letterSpacing:"1px" }}>{p.l}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Canvas */}
          <div ref={containerRef} style={{ flex:1, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", inset:0, pointerEvents:"none",
              backgroundImage:"linear-gradient(rgba(31,41,55,0.25) 1px,transparent 1px),linear-gradient(90deg,rgba(31,41,55,0.25) 1px,transparent 1px)",
              backgroundSize:"48px 48px",
              maskImage:"radial-gradient(ellipse 80% 80% at 50% 50%,transparent 20%,black 100%)" }} />
            <svg ref={svgRef} width="100%" height="100%" style={{ background:"transparent" }} />
            {hovered && (
              <div style={{ position:"absolute", top:14, left:"50%", transform:"translateX(-50%)",
                background:"#111827", border:"1px solid #1F2937", padding:"6px 14px",
                fontSize:"10px", color:"#94A3B8", pointerEvents:"none",
                whiteSpace:"nowrap", letterSpacing:"1px", zIndex:10 }}>
                {hovered.type === "account"   && `${hovered.handle} · ${hovered.tier?.toUpperCase()} · ${hovered.followers?.toLocaleString()} followers`}
                {hovered.type === "narrative" && `${hovered.label} · REACH ${hovered.reach?.toLocaleString()} · ${hovered.status?.toUpperCase()}`}
                {hovered.type === "hashtag"   && `${hovered.label} · ${hovered.volume?.toLocaleString()} posts · ${hovered.velocity?.toUpperCase()}`}
              </div>
            )}
            {!NODES.filter(n => filters[n.type] && matchesSearch(n)).length && (
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
                justifyContent:"center", color:"#374151", fontSize:"11px", letterSpacing:"2px" }}>
                {search ? `NO MATCHES FOR "${search}"` : "NO NODES VISIBLE — ENABLE FILTERS"}
              </div>
            )}
          </div>

          {/* Detail panel */}
          <DetailPanel selected={selected} onClose={() => setSelected(null)} onNavigate={setSelected} />
        </div>
      );
    }

    // ─── DETAIL PANEL ─────────────────────────────────────────────────────────────

    function DetailPanel({ selected, onClose, onNavigate }) {
      return (
        <div style={{ width: selected ? 265 : 0, background:"#0D1117",
          borderLeft: selected ? "1px solid #1F2937" : "none",
          transition:"width 0.2s ease", overflow:"hidden", flexShrink:0 }}>
          {selected && (
            <div style={{ padding:16, width:265 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <span style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px" }}>{selected.type.toUpperCase()} PROFILE</span>
                <button onClick={onClose}
                  style={{ background:"none", border:"none", color:"#4B5563", cursor:"pointer", fontSize:18, lineHeight:1, padding:0 }}>×</button>
              </div>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:13, fontWeight:"bold", color:nodeColor(selected), marginBottom:4, wordBreak:"break-all" }}>
                  {selected.handle || selected.label}
                </div>
                <div style={{ fontSize:"9px", color:"#374151", letterSpacing:"1px" }}>
                  {selected.platform?.toUpperCase() || "—"} &nbsp;·&nbsp;
                  {(selected.tier || selected.status || selected.velocity || "—").toUpperCase()}
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:14 }}>
                {selected.type === "account" && <>
                  <Stat label="FOLLOWERS"  value={selected.followers?.toLocaleString()} />
                  <Stat label="POSTS"      value={selected.posts} />
                  <Stat label="CONFIDENCE" value={`${Math.round((selected.confidence||0)*100)}%`}
                    color={selected.confidence > 0.75 ? "#EF4444" : selected.confidence > 0.5 ? "#F59E0B" : "#3B82F6"} />
                  <Stat label="EDGES"      value={getConnections(selected.id).length} />
                </>}
                {selected.type === "narrative" && <>
                  <Stat label="REACH"      value={selected.reach?.toLocaleString()} />
                  <Stat label="STATUS"     value={selected.status?.toUpperCase()}
                    color={selected.status === "active" ? "#EF4444" : "#F59E0B"} />
                  <Stat label="CONFIDENCE" value={`${Math.round((selected.confidence||0)*100)}%`} color="#EF4444" />
                  <Stat label="AMPLIFIERS" value={getConnections(selected.id).filter(e=>e.type==="AMPLIFIES").length} />
                </>}
                {selected.type === "hashtag" && <>
                  <Stat label="VOLUME"   value={selected.volume?.toLocaleString()} />
                  <Stat label="VELOCITY" value={selected.velocity?.toUpperCase()}
                    color={selected.velocity === "peak" ? "#EF4444" : "#F59E0B"} />
                </>}
              </div>

              {/* Sparkline — per node type */}
              <div style={{ marginBottom:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:"8px", color:"#374151", letterSpacing:"1.5px" }}>
                    {selected.type === "account"   && "POSTING CADENCE · 30D"}
                    {selected.type === "narrative" && "REACH OVER TIME · 14D"}
                    {selected.type === "hashtag"   && "VOLUME · 14D"}
                  </span>
                  <span style={{ fontSize:"8px", color:"#4B5563", letterSpacing:"1px" }}>
                    {selected.type === "narrative" && (selected.status === "active" ? "▲ ACTIVE" : "▼ DECAY")}
                    {selected.type === "hashtag"   && (selected.velocity || "").toUpperCase()}
                  </span>
                </div>
                <div style={{ background:"#080A0F", padding:"6px 6px 4px", border:"1px solid #1F2937" }}>
                  {selected.type === "account"
                    ? <Sparkbars data={timeSeries(selected, 30)} color={nodeColor(selected)} height={34} />
                    : <Sparkline data={timeSeries(selected, 14)}
                        color={selected.type === "narrative" && selected.status === "decaying" ? "#B45309" : nodeColor(selected)}
                        height={34} />}
                </div>
              </div>

              {selected.tags?.length > 0 && (
                <div style={{ marginBottom:14 }}>
                  <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"1.5px", marginBottom:8 }}>TAGS</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                    {selected.tags.map(tag => <TagChip key={tag} tag={tag} />)}
                  </div>
                </div>
              )}
              <div>
                <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"1.5px", marginBottom:8 }}>
                  CONNECTIONS ({getConnections(selected.id).length})
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:3, maxHeight:180, overflowY:"auto" }}>
                  {getConnections(selected.id).map((edge, i) => {
                    const otherId = edge.source === selected.id ? edge.target : edge.source;
                    const other   = NODES.find(n => n.id === otherId);
                    const dir     = edge.source === selected.id ? "→" : "←";
                    return (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:8,
                        padding:"4px 7px", background:"#111827", border:"1px solid #1A2234", cursor:"pointer" }}
                        onClick={() => onNavigate(other)}>
                        <div style={{ width:8, height:1, background:edgeColor(edge), flexShrink:0 }} />
                        <span style={{ color:"#64748B", flex:1, overflow:"hidden",
                          textOverflow:"ellipsis", whiteSpace:"nowrap", fontSize:"9px" }}>
                          {dir} {other?.handle || other?.label || otherId}
                        </span>
                        <span style={{ color:"#1F2937", fontSize:"8px", flexShrink:0 }}>
                          {edge.type.split("_")[0]}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── FEED VIEW — ranked triage list ───────────────────────────────────────────

    function FeedView({ search }) {
      const [tab, setTab] = useState("account");
      const tabs = [
        { key:"account",   label:"ACCOUNTS",   color:"#3B82F6" },
        { key:"narrative", label:"NARRATIVES", color:"#EF4444" },
        { key:"hashtag",   label:"HASHTAGS",   color:"#F59E0B" },
      ];
      const searchLower = search.trim().toLowerCase();
      const rows = NODES
        .filter(n => n.type === tab)
        .filter(n => {
          if (!searchLower) return true;
          const hay = ((n.handle || "") + " " + (n.label || "") + " " + (n.tags||[]).join(" ")).toLowerCase();
          return hay.includes(searchLower);
        })
        .map(n => ({ ...n, score: threatScore(n) }))
        .sort((a,b) => b.score - a.score);

      const maxScore = Math.max(1, ...rows.map(r => r.score));

      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"14px 20px", borderBottom:"1px solid #1F2937", background:"#0B0E13" }}>
            <div>
              <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2.5px", marginBottom:4 }}>OPERATOR TRIAGE</div>
              <div style={{ fontSize:"13px", color:"#CBD5E1", letterSpacing:"1.5px" }}>FEED — RANKED BY THREAT SCORE</div>
            </div>
            <div style={{ display:"flex", gap:4 }}>
              {tabs.map(t => (
                <div key={t.key} onClick={() => setTab(t.key)} style={{
                  padding:"5px 14px", fontSize:"9px", letterSpacing:"1.5px", cursor:"pointer",
                  border:`1px solid ${tab===t.key ? t.color+"60" : "#1F2937"}`,
                  background: tab===t.key ? t.color+"15" : "transparent",
                  color: tab===t.key ? "#CBD5E1" : "#475569"
                }}>
                  {t.label} · {NODES.filter(n => n.type === t.key).length}
                </div>
              ))}
            </div>
          </div>

          {/* Column header */}
          <div style={{ display:"grid",
            gridTemplateColumns:"4px 180px 50px 90px 70px 70px 1fr 90px",
            padding:"8px 20px", borderBottom:"1px solid #1F2937", background:"#0D1117",
            fontSize:"8px", color:"#374151", letterSpacing:"1.5px" }}>
            <div></div>
            <div>{tab === "account" ? "HANDLE" : tab === "narrative" ? "NARRATIVE" : "HASHTAG"}</div>
            <div>TIER</div>
            <div>THREAT</div>
            <div>TREND · 7D</div>
            <div>{tab === "hashtag" ? "VELOCITY" : "CONF."}</div>
            <div>TAGS</div>
            <div style={{ textAlign:"right" }}>ACTION</div>
          </div>

          {/* Rows */}
          <div style={{ flex:1, overflowY:"auto" }}>
            {rows.length === 0 && (
              <div style={{ padding:60, textAlign:"center", color:"#374151", fontSize:"11px", letterSpacing:"2px" }}>
                NO MATCHES
              </div>
            )}
            {rows.map(r => {
              const band = threatBand(r.score);
              const conf = r.type === "hashtag" ? r.velocity?.toUpperCase()
                : `${Math.round((r.confidence||0)*100)}%`;
              const tierVal = r.tier?.toUpperCase() || r.status?.toUpperCase() || "—";
              return (
                <div key={r.id} style={{ display:"grid",
                  gridTemplateColumns:"4px 180px 50px 90px 70px 70px 1fr 90px",
                  padding:"10px 20px", borderBottom:"1px solid #131A26",
                  alignItems:"center", cursor:"pointer", transition:"background 0.15s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#0F1521"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div style={{ width:3, height:24, background:band.color, justifySelf:"start" }} />
                  <div style={{ fontSize:"11px", color:nodeColor(r), fontWeight:"bold",
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {r.handle || r.label}
                  </div>
                  <div style={{ fontSize:"9px", color:"#64748B", letterSpacing:"1px" }}>{tierVal}</div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:38, height:4, background:"#1F2937", overflow:"hidden" }}>
                      <div style={{ width:`${Math.min(100, (r.score / maxScore) * 100)}%`, height:"100%", background:band.color }} />
                    </div>
                    <span style={{ fontSize:"10px", color:band.color, fontWeight:"bold", minWidth:28 }}>{r.score}</span>
                  </div>
                  <div style={{ paddingRight:10, opacity:0.9 }}>
                    {r.type === "account"
                      ? <Sparkbars data={timeSeries(r, 7)} color={band.color} height={18} />
                      : <Sparkline data={timeSeries(r, 7)} color={band.color} height={18} lineWidth={1.2} />}
                  </div>
                  <div style={{ fontSize:"10px", color:"#94A3B8" }}>{conf}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:3, overflow:"hidden", maxHeight:18 }}>
                    {(r.tags || []).slice(0,3).map(t => <TagChip key={t} tag={t} />)}
                    {(r.tags || []).length > 3 && <span style={{ fontSize:"8px", color:"#374151" }}>+{r.tags.length-3}</span>}
                  </div>
                  <div style={{ display:"flex", gap:4, justifyContent:"flex-end" }}>
                    <button style={{ fontSize:"8px", padding:"3px 8px", letterSpacing:"1px",
                      background:"transparent", border:"1px solid #1F2937", color:"#64748B", cursor:"pointer" }}>
                      INSPECT
                    </button>
                    <button style={{ fontSize:"8px", padding:"3px 8px", letterSpacing:"1px",
                      background:"transparent", border:"1px solid #7F1D1D", color:"#FCA5A5", cursor:"pointer" }}>
                      MUTE
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── REVIEW VIEW — human-approval queue ───────────────────────────────────────

    function ReviewView() {
      const [decisions, setDecisions] = useState({});
      const decide = (id, choice) => setDecisions(p => ({ ...p, [id]: choice }));

      const pending = REVIEW_QUEUE.filter(r => !decisions[r.id]);
      const reviewedToday = 47;
      const stats = [
        { l:"PENDING",            v: pending.length,                       c:"#F59E0B" },
        { l:"REVIEWED TODAY",     v: reviewedToday,                        c:"#10B981" },
        { l:"AVG LLM CONFIDENCE", v: "64%",                                c:"#3B82F6" },
        { l:"GATE 2 ITEMS",       v: REVIEW_QUEUE.filter(r=>r.gate==="GATE 2").length, c:"#EF4444" },
      ];

      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          {/* Header */}
          <div style={{ padding:"14px 20px", borderBottom:"1px solid #1F2937", background:"#0B0E13" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14 }}>
              <div>
                <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2.5px", marginBottom:4 }}>HUMAN-IN-THE-LOOP</div>
                <div style={{ fontSize:"13px", color:"#CBD5E1", letterSpacing:"1.5px" }}>REVIEW QUEUE — TAG VERDICTS AWAITING APPROVAL</div>
              </div>
              <div style={{ fontSize:"9px", color:"#4B5563", letterSpacing:"1.5px" }}>
                · GATE 1 routine 7-day window  · GATE 2 sensitive 10-day window
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
              {stats.map(s => (
                <div key={s.l} style={{ padding:"8px 12px", background:"#0D1117", border:"1px solid #1F2937" }}>
                  <div style={{ fontSize:"8px", color:"#4B5563", letterSpacing:"1.5px", marginBottom:4 }}>{s.l}</div>
                  <div style={{ fontSize:"14px", color:s.c, fontWeight:"bold" }}>{s.v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Cards */}
          <div style={{ flex:1, padding:16, overflowY:"auto" }}>
            {pending.length === 0 && (
              <div style={{ padding:60, textAlign:"center", color:"#374151", fontSize:"11px", letterSpacing:"2px" }}>
                ✓ QUEUE CLEAR — NICE WORK
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(330px, 1fr))", gap:12 }}>
              {pending.map(item => {
                const gate2 = item.gate === "GATE 2";
                return (
                  <div key={item.id} style={{ background:"#0D1117",
                    border:`1px solid ${gate2 ? "#7F1D1D" : "#1F2937"}`, padding:14, display:"flex", flexDirection:"column", gap:10 }}>
                    {/* gate + flagged at */}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:"8px", letterSpacing:"1.5px",
                        color: gate2 ? "#FCA5A5" : "#94A3B8",
                        background: gate2 ? "#1C0A0A" : "#111827",
                        border:`1px solid ${gate2 ? "#7F1D1D" : "#1F2937"}`, padding:"2px 7px" }}>
                        {item.gate}{gate2 && " · SENSITIVE"}
                      </span>
                      <span style={{ fontSize:"8px", color:"#374151" }}>FLAGGED {item.flagged_at}</span>
                    </div>

                    {/* verdict + confidence */}
                    <div>
                      <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"1.5px", marginBottom:6 }}>LLM VERDICT</div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <TagChip tag={item.verdict_tag} />
                        <div style={{ flex:1, height:3, background:"#1F2937", overflow:"hidden" }}>
                          <div style={{ width:`${item.confidence*100}%`, height:"100%", background:tierColor[item.tier] }} />
                        </div>
                        <span style={{ fontSize:"10px", color:tierColor[item.tier], fontWeight:"bold" }}>
                          {Math.round(item.confidence*100)}%
                        </span>
                      </div>
                    </div>

                    {/* target */}
                    <div style={{ fontSize:"10px", color:"#94A3B8" }}>
                      <span style={{ color:"#4B5563", letterSpacing:"1px", fontSize:"8px" }}>TARGET&nbsp;&nbsp;</span>
                      {item.target}
                    </div>

                    {/* grounding excerpt */}
                    <div>
                      <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"1.5px", marginBottom:5 }}>GROUNDING EXCERPT</div>
                      <div style={{ fontSize:"10px", color:"#CBD5E1", lineHeight:1.55, fontStyle:"italic",
                        background:"#080A0F", borderLeft:`2px solid ${tierColor[item.tier]}`, padding:"7px 10px" }}>
                        “{item.excerpt}”
                      </div>
                    </div>

                    {/* reason */}
                    <div style={{ fontSize:"9px", color:"#64748B", lineHeight:1.5 }}>
                      <span style={{ color:"#374151", letterSpacing:"1px", fontSize:"8px" }}>REASON&nbsp;&nbsp;</span>
                      {item.reason}
                    </div>

                    {/* model */}
                    <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"1px" }}>
                      {item.model}
                    </div>

                    {/* actions */}
                    <div style={{ display:"flex", gap:6, marginTop:2 }}>
                      <button onClick={() => decide(item.id, "reject")} style={{
                        flex:1, fontSize:"9px", padding:"6px 0", letterSpacing:"2px",
                        background:"transparent", border:"1px solid #1F2937", color:"#64748B", cursor:"pointer" }}>
                        REJECT
                      </button>
                      <button onClick={() => decide(item.id, "amend")} style={{
                        flex:1, fontSize:"9px", padding:"6px 0", letterSpacing:"2px",
                        background:"transparent", border:"1px solid #1F2937", color:"#94A3B8", cursor:"pointer" }}>
                        AMEND
                      </button>
                      <button onClick={() => decide(item.id, "approve")} style={{
                        flex:1, fontSize:"9px", padding:"6px 0", letterSpacing:"2px",
                        background:"#10B98115", border:"1px solid #10B98150", color:"#10B981", cursor:"pointer", fontWeight:"bold" }}>
                        APPROVE
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─── ACTIVITY FEED ────────────────────────────────────────────────────────────

    function ActivityFeed() {
      return (
        <div style={{ height:105, background:"#0D1117", borderTop:"1px solid #1F2937",
          padding:"8px 0 0", flexShrink:0 }}>
          <div style={{ fontSize:"8px", color:"#374151", letterSpacing:"2px", padding:"0 16px 7px" }}>
            ACTIVITY FEED
          </div>
          <div style={{ display:"flex", gap:8, paddingLeft:16, overflowX:"auto",
            paddingBottom:12, scrollbarWidth:"none" }}>
            {ACTIVITY.map((item, i) => (
              <div key={i} style={{ flexShrink:0, width:275, padding:"7px 10px",
                background: item.alert ? "#110A0A" : "#0D1117",
                border:`1px solid ${item.alert ? "#7F1D1D" : "#1F2937"}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                  {item.alert && <span className="pulse" style={{ color:"#EF4444", fontSize:"8px", letterSpacing:"1px" }}>⚠ ALERT</span>}
                  <span style={{ fontSize:"8px", color:"#374151" }}>{item.time}</span>
                </div>
                <div style={{ fontSize:"9px", color: item.alert ? "#FCA5A5" : "#4B5563", lineHeight:1.5 }}>
                  {item.text}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── ROOT APP ─────────────────────────────────────────────────────────────────

    function SigNet() {
      const [view,     setView]     = useState("graph");
      const [selected, setSelected] = useState(null);
      const [filters,  setFilters]  = useState({ account:true, narrative:true, hashtag:true });
      const [search,   setSearch]   = useState("");

      // Clear node selection when leaving graph (detail panel is graph-only)
      useEffect(() => { if (view !== "graph") setSelected(null); }, [view]);

      return (
        <div style={{ display:"flex", flexDirection:"column", height:"100vh",
          background:"#07090C", color:"#E2E8F0", fontFamily:"'Courier New',monospace", overflow:"hidden" }}>
          <TopBar search={search} setSearch={setSearch} view={view} />
          <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
            <LeftNav view={view} setView={setView} alertCount={REVIEW_QUEUE.length} />
            {view === "graph"  && (
              <GraphView selected={selected} setSelected={setSelected}
                filters={filters} setFilters={setFilters} search={search} />
            )}
            {view === "feed"   && <FeedView search={search} />}
            {view === "review" && <ReviewView />}
          </div>
          <ActivityFeed />
        </div>
      );
    }

    document.getElementById("boot").remove();
    ReactDOM.createRoot(document.getElementById("root")).render(<SigNet />);
  </script>
</body>
</html>
